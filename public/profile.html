<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/profile.css" />
</head>
<body>
  <div class="profile-container">
    <div class="profile-header">
      <button id="back-btn">← Back</button>
      <h2>My Profile</h2>
    </div>

    <div class="avatar-section">
      <img id="avatar-preview" src="https://via.placeholder.com/100" alt="Profile Picture" />
      <label for="avatar-input" class="avatar-edit-btn">Change Photo</label>
      <input type="file" id="avatar-input" accept="image/*" hidden />
    </div>

    <form id="profile-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Username" required />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Email" disabled />
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="tel" id="phone" placeholder="Phone number" />
      </div>
      <div class="form-group">
        <label>Address</label>
        <input type="text" id="address" placeholder="Address" />
      </div>

      <p class="error-msg" id="profile-error"></p>
      <p class="success-msg" id="profile-success"></p>
      <button type="submit" class="btn-primary">Save</button>
    </form>
  </div>

  <script type="module" src="js/profile.js"></script>
</body>
</html>
