<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatroom - Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-container">
    <h1 class="app-title">Chatroom</h1>

    <div class="tab-group">
      <button class="tab-btn active" id="tab-login">Login</button>
      <button class="tab-btn" id="tab-signup">Sign Up</button>
    </div>

    <form class="auth-form" id="login-form">
      <input type="email" id="login-email" placeholder="Email" required />
      <input type="password" id="login-password" placeholder="Password" required />
      <button type="submit" class="btn-primary">Login</button>
      <p class="error-msg" id="login-error"></p>
    </form>

    <form class="auth-form hidden" id="signup-form">
      <input type="text" id="signup-username" placeholder="Username" required />
      <input type="email" id="signup-email" placeholder="Email" required />
      <input type="password" id="signup-password" placeholder="Password (at least 6 characters)" required />
      <button type="submit" class="btn-primary">Sign Up</button>
      <p class="error-msg" id="signup-error"></p>
    </form>

    <div class="divider"><span>or</span></div>
    <button class="btn-google" id="google-btn">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
      Continue with Google
    </button>
  </div>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
