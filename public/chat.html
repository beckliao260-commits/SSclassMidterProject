<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatroom</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/chat.css" />
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="app-name">Chatroom</span>
      <div class="header-actions">
        <button id="new-chat-btn" title="New Chat">＋</button>
        <button id="profile-btn" title="Profile">👤</button>
        <button id="logout-btn" title="Logout">⏻</button>
      </div>
    </div>
    <div class="room-list" id="room-list">
      <!-- Chat rooms will be loaded here -->
    </div>
  </div>

  <!-- Main Chat Area -->
  <div class="chat-area">
    <div class="chat-header" id="chat-header">
      <span id="chat-title">Select a chat</span>
    </div>

    <div class="messages-container" id="messages-container">
      <p class="placeholder-text">Select a chat room to start messaging</p>
    </div>

    <div class="input-area" id="input-area">
      <textarea id="msg-input" placeholder="Type a message... (Shift+Enter for new line)" rows="1" disabled></textarea>
      <button id="send-btn" disabled>Send</button>
    </div>
  </div>

  <!-- New Chat Modal -->
  <div class="modal-overlay hidden" id="new-chat-modal">
    <div class="modal">
      <h3>New Chat</h3>
      <input type="email" id="invite-email" placeholder="Enter user's email" />
      <p class="error-msg" id="invite-error"></p>
      <div class="modal-actions">
        <button class="btn-secondary" id="cancel-chat-btn">Cancel</button>
        <button class="btn-primary" id="confirm-chat-btn">Start Chat</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/chat.js"></script>
</body>
</html>
